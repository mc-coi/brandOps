<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzNet — Live Social Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:     #09090f;
  --bg2:    #12121c;
  --bg3:    #1a1a28;
  --border: #25253a;
  --amber:  #f5a623;
  --green:  #22c55e;
  --red:    #ef4444;
  --blue:   #3b82f6;
  --purple: #a855f7;
  --pink:   #ec4899;
  --cyan:   #06b6d4;
  --muted:  #4b4b6a;
  --text:   #e8e3d8;
  --text2:  #7a7a9d;
  --sans:   'IBM Plex Sans', sans-serif;
  --mono:   'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; flex-direction: column; }

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 32px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px; background: var(--amber);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-family: var(--mono); font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.logo-sub  { font-size: 11px; color: var(--text2); font-family: var(--mono); margin-top: 1px; }
.live-badge {
  display: flex; align-items: center; gap: 7px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; color: var(--red); font-family: var(--mono);
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--red);
  animation: pulse-red 1.5s ease-in-out infinite;
}
@keyframes pulse-red { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.header-right { display: flex; align-items: center; gap: 20px; }
.stat-pill {
  background: var(--bg3); border: 1px solid var(--border);
  padding: 5px 14px; border-radius: 20px;
  font-family: var(--mono); font-size: 11px; color: var(--text2);
}
.stat-pill span { color: var(--amber); font-weight: 600; }

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  flex: 1;
  overflow: hidden;
}

/* ── Feed ── */
.feed-col { display: flex; flex-direction: column; overflow: hidden; padding: 24px 28px 16px; gap: 14px; }
.feed-label {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 2px; color: var(--text2);
  display: flex; align-items: center; gap: 8px;
}
.feed-label::after { content:''; flex:1; height:1px; background:var(--border); }

.posts-window { flex: 1; overflow: hidden; position: relative; }
.posts-inner { display: flex; flex-direction: column; gap: 12px; }

/* Post card */
.post-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  transition: border-color 0.3s, opacity 0.4s, transform 0.4s;
  opacity: 0;
  transform: translateY(18px);
}
.post-card.visible { opacity: 1; transform: translateY(0); }
.post-card.exiting { opacity: 0; transform: translateY(-18px); }

.post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
.post-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  border: 2px solid var(--border);
}
.post-meta { flex: 1; min-width: 0; }
.post-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.post-handle { font-family: var(--mono); font-size: 12px; color: var(--text2); }
.post-type-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono);
  flex-shrink: 0;
}
.badge-public     { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.badge-media      { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
.badge-rival      { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.badge-influencer { background: rgba(236,72,153,0.15); color: #f472b6; border: 1px solid rgba(236,72,153,0.3); }
.badge-brand      { background: rgba(245,166,35,0.15); color: #fbbf24; border: 1px solid rgba(245,166,35,0.3); }

.post-text {
  font-size: 16px; line-height: 1.55; color: var(--text);
  word-break: break-word;
}
.post-tag { color: var(--cyan); font-weight: 500; }

.post-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
}
.post-actions { display: flex; gap: 20px; }
.post-action { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text2); }
.post-time { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* Featured / new-post highlight */
.post-card.featured {
  border-color: var(--amber);
  box-shadow: 0 0 20px rgba(245,166,35,0.08);
}

/* ── Sidebar ── */
.sidebar {
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  padding: 24px 20px;
  gap: 20px;
}

.sidebar-section { display: flex; flex-direction: column; gap: 12px; }
.sidebar-title {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 2px; color: var(--text2);
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}

/* Trending brands */
.trend-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; background: var(--bg3);
  border-radius: 8px; border: 1px solid var(--border);
}
.trend-rank { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 16px; flex-shrink: 0; }
.trend-name { font-weight: 600; font-size: 13px; flex: 1; }
.trend-sentiment {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  padding: 2px 7px; border-radius: 10px;
}

/* Recent posts mini-list */
.mini-post {
  padding: 10px 12px; background: var(--bg3);
  border-radius: 8px; border: 1px solid var(--border);
  font-size: 12px; line-height: 1.5; color: var(--text2);
}
.mini-post .mini-handle { color: var(--text); font-weight: 600; font-size: 11px; margin-bottom: 4px; }

/* ── Ticker at bottom ── */
.ticker {
  background: var(--bg2); border-top: 1px solid var(--border);
  padding: 8px 24px; display: flex; align-items: center; gap: 16px;
  flex-shrink: 0; overflow: hidden;
}
.ticker-label {
  background: var(--amber); color: #000;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px; white-space: nowrap;
  text-transform: uppercase; flex-shrink: 0;
}
.ticker-track { flex: 1; overflow: hidden; position: relative; height: 20px; }
.ticker-inner {
  position: absolute; white-space: nowrap;
  font-family: var(--mono); font-size: 12px; color: var(--text2);
  animation: scroll-left 40s linear infinite;
}
@keyframes scroll-left { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

/* Page nav dots */
.page-dots {
  display: flex; gap: 6px; align-items: center; justify-content: center;
  margin-top: auto; padding-top: 8px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s, width 0.3s; }
.dot.active { background: var(--amber); width: 18px; border-radius: 3px; }

/* Empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--muted);
}
.empty-state .icon { font-size: 48px; opacity: 0.4; }
.empty-state p { font-family: var(--mono); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📣</div>
    <div>
      <div class="logo-text">BuzzNet</div>
      <div class="logo-sub">BRANDOPS SOCIAL FEED</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-pill">Posts today: <span id="postCount">0</span></div>
    <div class="stat-pill">Teams: <span id="teamCount">0</span></div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
</header>

<div class="layout">

  <!-- Feed -->
  <div class="feed-col">
    <div class="feed-label">Live Feed</div>
    <div class="posts-window" id="postsWindow">
      <div class="posts-inner" id="postsInner">
        <div class="empty-state" id="emptyState">
          <div class="icon">💬</div>
          <p>Waiting for posts...</p>
          <p style="font-size:11px;opacity:0.6">Teacher can create posts from the console</p>
        </div>
      </div>
    </div>
    <div class="page-dots" id="pageDots"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">📊 Sentiment Rankings</div>
      <div id="sentimentList">
        <div style="color:var(--muted);font-size:12px;font-family:var(--mono)">Loading teams...</div>
      </div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="sidebar-title">🕐 Recent Activity</div>
      <div id="recentActivity" style="display:flex;flex-direction:column;gap:8px;overflow:hidden;flex:1"></div>
    </div>
  </div>
</div>

<!-- Ticker -->
<div class="ticker">
  <div class="ticker-label">BuzzNet</div>
  <div class="ticker-track">
    <div class="ticker-inner" id="tickerInner">Loading feed...</div>
  </div>
</div>

<script src="js/firebase-config.js"></script>
<script>
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let allPosts   = [];
let teamsData  = {};
let page       = 0;
let postsPerPage = 3;
let cycleTimer = null;

const BADGE = {
  public:     { label: 'Public',     cls: 'badge-public' },
  media:      { label: 'Media',      cls: 'badge-media' },
  rival:      { label: 'Rival',      cls: 'badge-rival' },
  influencer: { label: 'Influencer', cls: 'badge-influencer' },
  brand:      { label: 'Brand',      cls: 'badge-brand' },
};

// ── Firebase listeners ─────────────────────────────────────
db.ref('teams').on('value', snap => {
  teamsData = snap.val() || {};
  document.getElementById('teamCount').textContent = Object.keys(teamsData).length;
  renderSentimentList();
});

db.ref('social/posts').on('value', snap => {
  const raw = snap.val() || {};
  allPosts = Object.entries(raw)
    .map(([k, v]) => ({ ...v, _key: k }))
    .sort((a, b) => b.timestamp - a.timestamp);
  document.getElementById('postCount').textContent = allPosts.length;
  renderFeed();
  renderRecentActivity();
  updateTicker();
});

// ── Sentiment sidebar ──────────────────────────────────────
function renderSentimentList() {
  const teams = Object.entries(teamsData)
    .map(([id, t]) => ({ id, name: t.brandName || 'Unknown', sentiment: t.stats?.sentiment ?? 50 }))
    .sort((a, b) => b.sentiment - a.sentiment);

  const el = document.getElementById('sentimentList');
  if (!teams.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;font-family:var(--mono)">No teams yet</div>'; return; }

  el.innerHTML = teams.map((t, i) => {
    const s = t.sentiment;
    const color = s >= 70 ? '#22c55e' : s >= 40 ? '#f5a623' : '#ef4444';
    const bg    = s >= 70 ? 'rgba(34,197,94,0.1)' : s >= 40 ? 'rgba(245,166,35,0.1)' : 'rgba(239,68,68,0.1)';
    const emoji = s >= 70 ? '🔥' : s >= 40 ? '😐' : '💀';
    return `<div class="trend-row">
      <div class="trend-rank">${i + 1}</div>
      <div class="trend-name">${t.name}</div>
      <div class="trend-sentiment" style="color:${color};background:${bg}">${emoji} ${s}</div>
    </div>`;
  }).join('');
}

// ── Main feed ──────────────────────────────────────────────
function renderFeed() {
  const inner = document.getElementById('postsInner');
  const empty = document.getElementById('emptyState');

  if (!allPosts.length) {
    inner.innerHTML = '';
    inner.appendChild(empty);
    document.getElementById('pageDots').innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(allPosts.length / postsPerPage);
  if (page >= totalPages) page = 0;

  const slice = allPosts.slice(page * postsPerPage, page * postsPerPage + postsPerPage);

  inner.innerHTML = slice.map((p, i) => buildPostCard(p, i === 0 && page === 0)).join('');

  // Animate in
  requestAnimationFrame(() => {
    inner.querySelectorAll('.post-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 80);
    });
  });

  renderDots(totalPages);
}

function buildPostCard(post, featured = false) {
  const badge = BADGE[post.accountType] || BADGE.public;
  const text  = (post.text || '').replace(/#(\w+)/g, '<span class="post-tag">#$1</span>')
                                   .replace(/@(\w+)/g,  '<span class="post-tag">@$1</span>');
  const likes = post.likes || 0;
  const rts   = Math.floor(likes * 0.3);
  const ago   = timeAgo(post.timestamp);

  const imgHtml = post.imageUrl
    ? `<img src="${esc(post.imageUrl)}" alt="" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:block" onerror="this.style.display='none'">`
    : '';

  return `<div class="post-card${featured ? ' featured' : ''}">
    <div class="post-header">
      <div class="post-avatar" style="background:${avatarBg(post.accountType)}">${post.avatar || '👤'}</div>
      <div class="post-meta">
        <div class="post-name">${esc(post.displayName || 'Anonymous')}</div>
        <div class="post-handle">${esc(post.handle || '@unknown')}</div>
      </div>
      <div class="post-type-badge ${badge.cls}">${badge.label}</div>
    </div>
    <div class="post-text">${text}</div>
    ${imgHtml}
    <div class="post-footer">
      <div class="post-actions">
        <div class="post-action">❤️ <span>${likes.toLocaleString()}</span></div>
        <div class="post-action">🔁 <span>${rts.toLocaleString()}</span></div>
        <div class="post-action">💬 <span>${Math.floor(likes * 0.12)}</span></div>
      </div>
      <div class="post-time">${ago}</div>
    </div>
  </div>`;
}

function avatarBg(type) {
  return { public: '#1e2a3a', media: '#2a1e3a', rival: '#3a1e1e', influencer: '#3a1e2e' }[type] || '#1e1e2a';
}

function renderDots(total) {
  const el = document.getElementById('pageDots');
  el.innerHTML = Array.from({ length: total }, (_, i) =>
    `<div class="dot${i === page ? ' active' : ''}"></div>`
  ).join('');
}

// ── Recent activity sidebar ────────────────────────────────
function renderRecentActivity() {
  const el = document.getElementById('recentActivity');
  const recent = allPosts.slice(0, 5);
  if (!recent.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;font-family:var(--mono)">No posts yet</div>'; return; }
  el.innerHTML = recent.map(p => `
    <div class="mini-post">
      <div class="mini-handle">${esc(p.handle || '@unknown')} · ${timeAgo(p.timestamp)}</div>
      ${esc((p.text || '').substring(0, 80))}${(p.text || '').length > 80 ? '…' : ''}
    </div>
  `).join('');
}

// ── Ticker ─────────────────────────────────────────────────
function updateTicker() {
  if (!allPosts.length) return;
  const items = allPosts.slice(0, 10).map(p =>
    `${p.handle || '@user'}: "${(p.text || '').substring(0, 60)}${(p.text||'').length > 60 ? '…' : ''}"`
  );
  document.getElementById('tickerInner').textContent = items.join('   ·   ');
}

// ── Auto-cycle pages ───────────────────────────────────────
function startCycle() {
  clearInterval(cycleTimer);
  cycleTimer = setInterval(() => {
    if (!allPosts.length) return;
    const totalPages = Math.ceil(allPosts.length / postsPerPage);
    page = (page + 1) % totalPages;
    renderFeed();
  }, 8000);
}
startCycle();

// Click to advance
document.getElementById('postsWindow').addEventListener('click', () => {
  if (!allPosts.length) return;
  const totalPages = Math.ceil(allPosts.length / postsPerPage);
  page = (page + 1) % totalPages;
  renderFeed();
  startCycle(); // reset timer
});

// ── Utilities ──────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return 'just now';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
