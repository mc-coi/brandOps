<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandOps — Head-to-Head</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:#0a0a0b;--bg2:#111117;--bg3:#18181f;--bg4:#1e1e28;
  --border:#2a2a38;--amber:#f5a623;--green:#22c55e;--red:#ef4444;
  --yellow:#eab308;--muted:#6b7280;--text:#e8e3d8;--text2:#9d97a0;
  --serif:'Playfair Display',serif;--mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}

/* ── Header ── */
.top{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.top-title{font-family:var(--serif);font-size:22px;font-weight:900;}
.top-meta{font-family:var(--mono);font-size:11px;color:var(--muted);}
.rival-tag{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);padding:3px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;}

/* ── VS banner ── */
.vs-banner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:28px 32px;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);}
.vs-brand{text-align:center;}
.vs-name{font-family:var(--serif);font-size:36px;font-weight:900;line-height:1.1;}
.vs-tag{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:4px;}
.vs-score{font-family:var(--serif);font-size:52px;font-weight:900;color:var(--amber);margin-top:8px;}
.vs-stock{font-family:var(--mono);font-size:13px;margin-top:2px;}
.vs-sep{font-family:var(--serif);font-size:48px;font-weight:900;color:var(--muted);padding:0 28px;}
.vs-rank-pill{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;display:inline-block;margin-top:6px;}
.rank-1{background:rgba(245,166,35,.2);color:var(--amber);}
.rank-other{background:rgba(107,114,128,.15);color:var(--muted);}

/* ── Body grid ── */
.body{padding:24px 32px;display:grid;grid-template-columns:1fr 80px 1fr;gap:0;}

/* ── Stat rows ── */
.stat-section{margin-bottom:28px;}
.sect-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:14px;grid-column:1/-1;}
.stat-row{display:contents;}
.stat-left,.stat-right{padding:6px 0;}
.stat-center{display:flex;align-items:center;justify-content:center;padding:6px 8px;}
.stat-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.stat-val{font-family:var(--serif);font-size:28px;font-weight:900;line-height:1;}
.stat-bar-wrap{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:5px;}
.stat-bar-fill{height:100%;border-radius:3px;transition:width .7s ease;}
.stat-vs-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center;}
.winner-pip{width:8px;height:8px;border-radius:50%;display:inline-block;margin-top:2px;}

/* ── Event log compare ── */
.event-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.event-col-title{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px;}
.event-item{padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.event-item:last-child{border:none;}
.event-week{font-family:var(--mono);font-size:9px;color:var(--muted);}
.event-title{font-weight:600;margin:2px 0;}
.effect-pill{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:2px;display:inline-block;margin-right:3px;}
.pp{background:rgba(34,197,94,.15);color:var(--green);}
.np{background:rgba(239,68,68,.15);color:var(--red);}

/* ── Score comparison table ── */
.score-compare{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.score-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.score-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;}
.s1{background:rgba(239,68,68,.2);color:var(--red);}
.s3{background:rgba(234,179,8,.2);color:var(--yellow);}
.s5{background:rgba(34,197,94,.2);color:var(--green);}

/* ── Sparklines ── */
.spark-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
.spark-wrap{background:var(--bg3);border:1px solid var(--border);padding:14px;}
.spark-title{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.spark-price{font-family:var(--mono);font-size:18px;font-weight:600;margin-bottom:6px;}

/* ── Section headers ── */
.compare-section-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:14px;grid-column:1/-1;}

/* ── Advantage summary ── */
.advantage-bar{display:flex;height:32px;border-radius:4px;overflow:hidden;margin-bottom:6px;}
.adv-a{background:var(--amber);display:flex;align-items:center;justify-content:flex-end;padding:0 10px;font-family:var(--mono);font-size:11px;font-weight:600;color:#000;transition:flex .8s ease;}
.adv-b{background:var(--blue,#3b82f6);display:flex;align-items:center;padding:0 10px;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;transition:flex .8s ease;}
.adv-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);}

.no-data{font-family:var(--mono);font-size:11px;color:var(--muted);font-style:italic;padding:10px 0;}
</style>
</head>
<body>

<div class="top">
  <div class="top-title">⚔ Head-to-Head Comparison</div>
  <div style="display:flex;align-items:center;gap:14px">
    <span id="rivalTag" class="rival-tag" style="display:none">Designated Rivals</span>
    <span class="top-meta" id="topMeta">Week — · —</span>
    <a href="index.html" style="color:var(--amber);text-decoration:none;font-family:var(--mono);font-size:11px">← Leaderboard</a>
  </div>
</div>

<!-- VS banner -->
<div class="vs-banner">
  <div class="vs-brand" id="bannerA"></div>
  <div class="vs-sep">VS</div>
  <div class="vs-brand" id="bannerB"></div>
</div>

<!-- Main body -->
<div style="padding:28px 32px">

  <!-- Advantage bar -->
  <div style="margin-bottom:28px">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:8px">Overall Advantage</div>
    <div class="advantage-bar">
      <div class="adv-a" id="advA" style="flex:1">—</div>
      <div class="adv-b" id="advB" style="flex:1">—</div>
    </div>
    <div class="adv-labels">
      <span id="advLabelA">—</span>
      <span id="advLabelB">—</span>
    </div>
  </div>

  <!-- Stat comparison grid -->
  <div style="font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:16px">
    Stats Head-to-Head
  </div>
  <div id="statsGrid" style="margin-bottom:28px"></div>

  <!-- Stock sparklines -->
  <div style="font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:16px">
    Stock Price History
  </div>
  <div class="spark-cols" id="sparkCols"></div>

  <!-- Score logs -->
  <div style="font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:16px">
    Deliverable Scores
  </div>
  <div class="score-compare" id="scoreCompare"></div>

  <!-- Event histories -->
  <div style="font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:16px">
    Event Histories
  </div>
  <div class="event-cols" id="eventCols"></div>

</div>

<script src="js/firebase-config.js"></script>
<script src="js/game-engine.js"></script>
<script src="js/event-cards.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const ID_A = params.get('a');
const ID_B = params.get('b');

if (!ID_A || !ID_B) {
  document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:monospace;color:#f5a623">Missing team IDs.<br><br>URL should be: compare.html?a=TEAM_A_ID&b=TEAM_B_ID<br><br><a href="index.html" style="color:#f5a623">← Leaderboard</a></div>';
} else {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.database();
  let seasonData = {}, teamA = {}, teamB = {}, allTeams = {};

  db.ref('season').on('value', s => { seasonData = s.val() || {}; render(); });
  db.ref('teams').on('value', s => {
    allTeams = s.val() || {};
    teamA = allTeams[ID_A] || {};
    teamB = allTeams[ID_B] || {};
    render();
  });

  function render() {
    if (!teamA.brandName || !teamB.brandName) return;
    const week   = seasonData.currentWeek || 1;
    const phase  = GameEngine.getPhase(week);
    const scoreA = GameEngine.calcMarketScore(teamA.stats || {});
    const scoreB = GameEngine.calcMarketScore(teamB.stats || {});
    const isRival = teamA.rivalId === ID_B;

    document.title = teamA.brandName + ' vs ' + teamB.brandName + ' — BrandOps';
    document.getElementById('topMeta').textContent = 'Week ' + week + ' · ' + phase.emoji + ' ' + phase.name;
    document.getElementById('rivalTag').style.display = isRival ? 'inline-block' : 'none';

    // VS banners
    renderBanner('bannerA', teamA, scoreA, allTeams, 1);
    renderBanner('bannerB', teamB, scoreB, allTeams, 2);

    // Advantage bar
    const total = scoreA + scoreB || 1;
    const pctA  = Math.round((scoreA / total) * 100);
    const pctB  = 100 - pctA;
    document.getElementById('advA').style.flex = pctA;
    document.getElementById('advB').style.flex = pctB;
    document.getElementById('advA').textContent  = scoreA > scoreB ? teamA.brandName : '';
    document.getElementById('advB').textContent  = scoreB > scoreA ? teamB.brandName : '';
    document.getElementById('advLabelA').textContent = teamA.brandName + ' — Market Score ' + scoreA;
    document.getElementById('advLabelB').textContent = teamB.brandName + ' — Market Score ' + scoreB;

    renderStats(teamA.stats || {}, teamB.stats || {});
    renderSparks();
    renderScores();
    renderEvents();
  }

  function renderBanner(elId, team, score, allTeams, pos) {
    const sorted = Object.values(allTeams)
      .map(t => GameEngine.calcMarketScore(t.stats || {}))
      .sort((a,b) => b - a);
    const ms   = GameEngine.calcMarketScore(team.stats || {});
    const rank = sorted.indexOf(ms) + 1;
    const hist = team.stockHistory || [];
    const price = hist.length ? GameEngine.formatDollar(hist[hist.length-1]) : '—';
    const trend = GameEngine.stockTrend(hist);
    const pillClass = rank === 1 ? 'rank-1' : 'rank-other';

    document.getElementById(elId).innerHTML = `
      <div class="vs-name">${team.brandName}</div>
      <div class="vs-tag">${team.industry || ''} · ${team.targetDemo || ''}</div>
      <div class="vs-score">${score}</div>
      <div class="vs-stock" style="color:${trend.color}">${price} ${trend.arrow}</div>
      <div class="vs-rank-pill ${pillClass}">#${rank} in market</div>
      ${team.members ? `<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px">${team.members}</div>` : ''}
    `;
  }

  const STATS = [
    { key:'budget',     label:'Budget',     invert:false },
    { key:'demand',     label:'Demand',     invert:false },
    { key:'reputation', label:'Reputation', invert:false },
    { key:'innovation', label:'Innovation', invert:false },
    { key:'sentiment',  label:'Sentiment',  invert:false },
    { key:'risk',       label:'Risk',       invert:true  },
  ];

  function renderStats(sA, sB) {
    const el = document.getElementById('statsGrid');
    el.innerHTML = STATS.map(s => {
      const vA = sA[s.key] !== undefined ? sA[s.key] : 0;
      const vB = sB[s.key] !== undefined ? sB[s.key] : 0;
      const aWins = s.invert ? vA < vB : vA > vB;
      const bWins = s.invert ? vB < vA : vB > vA;
      const cA = GameEngine.statColor(s.key, vA);
      const cB = GameEngine.statColor(s.key, vB);
      return `
        <div style="display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;margin-bottom:14px">
          <!-- Left -->
          <div style="${aWins ? 'border-left:3px solid ' + cA + ';padding-left:10px' : 'padding-left:13px'}">
            <div class="stat-label">${s.label}${s.invert ? ' ↓' : ''}</div>
            <div class="stat-val" style="color:${cA}">${vA}</div>
            <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${vA}%;background:${cA}"></div></div>
          </div>
          <!-- Center -->
          <div style="text-align:center">
            <div class="stat-vs-label">${s.label}</div>
            <div style="font-family:var(--mono);font-size:10px;color:${aWins ? cA : bWins ? cB : 'var(--muted)'};margin-top:4px">
              ${aWins ? '◀ ' + teamA.brandName : bWins ? teamB.brandName + ' ▶' : 'TIED'}
            </div>
          </div>
          <!-- Right -->
          <div style="text-align:right;${bWins ? 'border-right:3px solid ' + cB + ';padding-right:10px' : 'padding-right:13px'}">
            <div class="stat-label">${s.label}${s.invert ? ' ↓' : ''}</div>
            <div class="stat-val" style="color:${cB}">${vB}</div>
            <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${vB}%;background:${cB}"></div></div>
          </div>
        </div>`;
    }).join('');
  }

  function renderSparks() {
    const el = document.getElementById('sparkCols');
    [{ team: teamA, label: teamA.brandName }, { team: teamB, label: teamB.brandName }].forEach(({ team, label }) => {
      const hist  = team.stockHistory || [];
      const price = hist.length ? GameEngine.formatDollar(hist[hist.length - 1]) : '$—';
      const trend = GameEngine.stockTrend(hist);
      el.innerHTML += `
        <div class="spark-wrap">
          <div class="spark-title">${label}</div>
          <div class="spark-price" style="color:${trend.color}">${price} <span style="font-size:12px">${trend.arrow} ${trend.diff || ''}</span></div>
          ${GameEngine.sparklineSVG(hist, 320, 52)}
        </div>`;
    });
  }

  function renderScores() {
    const el = document.getElementById('scoreCompare');
    [{ team: teamA, label: teamA.brandName }, { team: teamB, label: teamB.brandName }].forEach(({ team, label }) => {
      const log = Object.values(team.scoreLog || {}).sort((a,b) => b.timestamp - a.timestamp);
      const total = log.reduce((s,e) => s + (e.points || 0), 0);
      el.innerHTML += `
        <div>
          <div class="event-col-title">${label} — ${total} total pts</div>
          ${log.length ? log.map(e => {
            const del = DELIVERABLE_TYPES[e.deliverable];
            return `<div class="score-item">
              <div>
                <div style="color:var(--text)">${del?.label || e.deliverable}</div>
                <div style="font-size:10px;color:var(--muted)">Week ${e.week}</div>
              </div>
              <span class="score-badge s${e.score}">${e.label}</span>
            </div>`;
          }).join('') : '<div class="no-data">No deliverables scored.</div>'}
        </div>`;
    });
  }

  function renderEvents() {
    const el = document.getElementById('eventCols');
    [{ team: teamA, label: teamA.brandName }, { team: teamB, label: teamB.brandName }].forEach(({ team, label }) => {
      const log = Object.values(team.eventLog || {}).sort((a,b) => b.timestamp - a.timestamp);
      el.innerHTML += `
        <div>
          <div class="event-col-title">${label}</div>
          ${log.length ? log.map(e => {
            const fx = e.choice === 'A' ? CardLibrary.getById(e.cardId)?.choiceA?.effects
                     : e.choice === 'B' ? CardLibrary.getById(e.cardId)?.choiceB?.effects
                     : e.effects || {};
            const chips = Object.entries(fx || {}).map(([s,v]) =>
              `<span class="effect-pill ${v>0?'pp':'np'}">${s} ${v>0?'+':''}${v}</span>`
            ).join('');
            return `<div class="event-item">
              <div class="event-week">Week ${e.week} · ${(e.deck||'').toUpperCase()}</div>
              <div class="event-title">${e.cardTitle || e.cardId}</div>
              <div>${chips}</div>
              ${e.choice ? `<div style="font-family:var(--mono);font-size:9px;color:var(--amber);margin-top:2px">Choice ${e.choice}</div>` : ''}
            </div>`;
          }).join('') : '<div class="no-data">No events yet.</div>'}
        </div>`;
    });
  }
}
</script>
</body>
</html>
